<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nartfron | 2D Lofi Aesthetics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILO GENERAL - FONDO BLANCO CON IMAGEN DE FONDO */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #000000;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('https://i.imgur.com/AWjUw8z.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* CAPA OSCURA PARA QUE EL TEXTO SE LEA BIEN */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: -1;
        }

        /* CONTENEDOR PRINCIPAL - BORDES RECTOS */
        .container {
            position: relative;
            width: 90%;
            max-width: 420px;
            text-align: center;
            padding: 30px 20px;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #e5e5e5;
            border-radius: 0px;
        }

        /* TEXTO DE MARCA */
        .brand-title {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: #000000;
            letter-spacing: 0.5px;
        }
        .brand-subtitle {
            font-size: 14px;
            color: #ff69b4;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 25px 0;
        }

        /* IMAGEN DE PORTADA DEL PRODUCTO */
        .product-image {
            width: 100%;
            border-radius: 0px;
            margin-bottom: 20px;
            border: 1px solid #e5e5e5;
        }

        /* TÍTULO Y DESCRIPCIÓN */
        .product-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0 0 10px 0;
            color: #000000;
        }

        .product-description {
            font-size: 14px;
            color: #333333;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: left;
        }

        /* BOTONES UNIFORMES - ESTILO LIMPIO */
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 0;
            text-decoration: none;
            color: #000000;
            font-size: 15px;
            border: 1px solid #e5e5e5;
            border-radius: 0px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-social:hover {
            background: #f5f5f5;
            border-color: #ff69b4;
        }

        .btn-social i { font-size: 18px; }

        /* COLORES DE ICONOS */
        .btn-spotify i { color: #1DB954; }
        .btn-instagram i { color: #E1306C; }
        .btn-youtube i { color: #FF0000; }
        .btn-custom i { color: #ff69b4; }
        .btn-email i { color: #333333; }

        footer {
            margin-top: 20px;
            font-size: 11px;
            color: #888888;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- TEXTO DE MARCA -->
        <h1 class="brand-title">Nartfron</h1>
        <p class="brand-subtitle">2D Lofi Aesthetics</p>

        <!-- IMAGEN DE PORTADA -->
        <img src="https://i.imgur.com/uNlsfFb.png" alt="Custom 2D Lofi Scene" class="product-image">

        <h1 class="product-title">Custom 2D Lofi Scene</h1>

        <p class="product-description">
            Personalized 9:16 2D Lofi scene, NYC or Rio style.
        </p>

        <!-- BOTONES SOCIALES Y DE ACCIÓN (TODOS UNIFORMES) -->
        <div class="social-links">
            <!-- Botón de YouTube (ACTUALIZADO CON TU LINK) -->
            <a href="https://www.youtube.com/@Nartfron" target="_blank" class="btn-social btn-youtube">
                <i class="fab fa-youtube"></i> YouTube
            </a>

            <!-- Botón de Spotify -->
            <a href="https://open.spotify.com/playlist/3G40MY61eZ8fhPr1iAw5dC?si=581c2a4842b64d7f" target="_blank" class="btn-social btn-spotify">
                <i class="fab fa-spotify"></i> Listen to the Playlist
            </a>

            <!-- Botón de Instagram -->
            <a href="https://www.instagram.com/nartfron/" target="_blank" class="btn-social btn-instagram">
                <i class="fab fa-instagram"></i> See the Portfolio
            </a>

            <!-- Botón de "Your Custom Scene" (Redirige a Gumroad) -->
            <a href="https://nartistry.gumroad.com/l/nartfron" target="_blank" class="btn-social btn-custom">
                <i class="fas fa-palette"></i> Your Custom Scene
            </a>

            <!-- Botón de Colaboración / Emprendedores (Abre el correo) -->
            <a href="mailto:nartcontactme@gmail.com" class="btn-social btn-email">
                <i class="fas fa-envelope"></i> Entrepreneurs & Collab
            </a>
        </div>

        <footer>© 2026 Nartfron</footer>

    </div>
</body>
</html>
