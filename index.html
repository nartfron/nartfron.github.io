<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nartfron | Custom 2D Lofi Scenes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; color: #f0f0f0; background-color: #0d0710; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -2; object-fit: cover; filter: brightness(0.4) blur(2px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 7, 16, 0.85); z-index: -1; }
        .container { position: relative; width: 90%; max-width: 400px; text-align: center; padding: 20px; z-index: 1; }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.15); object-fit: cover; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 500; margin: 0 0 5px 0; color: #fff; }
        p.subtitle { font-size: 14px; color: #a0a0a0; margin: 0 0 25px 0; }
        
        form input, form textarea { width: 100%; padding: 12px 14px; margin-bottom: 10px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.04); color: #fff; font-family: inherit; font-size: 14px; box-sizing: border-box; transition: border 0.3s; }
        form input:focus, form textarea:focus { outline: none; border-color: #ff69b4; }
        textarea { resize: vertical; height: 80px; }
        
        .btn { display: block; text-decoration: none; color: #f0f0f0; padding: 14px 0; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; font-size: 15px; transition: all 0.25s ease; background: rgba(255, 255, 255, 0.03); width: 100%; }
        .btn:hover { background: rgba(255, 255, 255, 0.08); border-color: #ff69b4; transform: translateY(-1px); }
        .btn-primary { border-color: #ff69b4; color: #ff69b4; font-weight: 500; background: rgba(255, 105, 180, 0.05); }
        .btn i { margin-right: 8px; font-size: 16px; }
        
        footer { margin-top: 25px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://i.imgur.com/wXO5H6n.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="container">
        <img src="https://i.imgur.com/IYSD1gs.jpeg" alt="Nartfron" class="profile-img">
        <h1>Nartfron</h1>
        <p class="subtitle">NYC 2D Aesthetics · Custom Commissions</p>

        <!-- FORMULARIO DE CONTACTO -->
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="text" placeholder="Your Instagram Handle" required>
            <textarea placeholder="Describe the vibe you want (e.g., Sofa, rain, NYC skyline)"></textarea>
        </form>

        <!-- BOTÓN DE COMISIONES CON EL NUEVO PRECIO -->
        <a href="#" class="btn btn-primary">
            <i class="fas fa-palette"></i> Commission a Custom Scene ($5 USD)
        </a>

        <!-- BOTÓN DE INSTAGRAM -->
        <a href="https://www.instagram.com/nartfron/" target="_blank" class="btn">
            <i class="fab fa-instagram"></i> View Portfolio
        </a>

        <footer>© 2026 Nartfron</footer>
    </div>
</body>
</html>
